name: Deploy to Fly.io

on:
  workflow_dispatch:
    inputs:
      server:
        description: 'Server to deploy to'
        required: true
        type: choice
        options:
          - test1
          - test2
          - staging

jobs:
  deploy:
    name: Deploy to eyra-next-${{ inputs.server }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set VERSION
        run: |
          VERSION="${{ github.ref_name }}_$(date +%F)_${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Select Fly config
        id: config
        run: |
          if [ "${{ inputs.server }}" = "staging" ]; then
            echo "config=fly.staging.toml" >> $GITHUB_OUTPUT
          else
            echo "config=fly.test.toml" >> $GITHUB_OUTPUT
          fi

      - name: Select API token
        id: token
        run: |
          case "${{ inputs.server }}" in
            test1) echo "token_name=FLY_API_TOKEN_TEST1" >> $GITHUB_OUTPUT ;;
            test2) echo "token_name=FLY_API_TOKEN_TEST2" >> $GITHUB_OUTPUT ;;
            staging) echo "token_name=FLY_API_TOKEN_STAGING" >> $GITHUB_OUTPUT ;;
          esac

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only -c ${{ steps.config.outputs.config }} \
            --app eyra-next-${{ inputs.server }} \
            --build-arg VERSION=${{ env.VERSION }} \
            --build-arg PLATFORM=fly \
            --build-arg GIT_COMMIT=${{ github.sha }}
        working-directory: core
        env:
          FLY_API_TOKEN: ${{ secrets[steps.token.outputs.token_name] }}
