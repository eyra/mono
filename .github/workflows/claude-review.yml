name: Claude Code Review

# Manual-only. To run a review, open the Actions tab in GitHub, pick this
# workflow, and click "Run workflow" with the PR number.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1.0.157
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Review PR #${{ github.event.inputs.pr_number }}"
          timeout_minutes: 10
