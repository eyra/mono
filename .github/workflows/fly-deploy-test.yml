name: Deploy to Fly.io (test)

on:
  workflow_dispatch:
    inputs:
      server:
        description: 'Test server to deploy to'
        required: true
        type: choice
        options:
          - test1
          - test2

jobs:
  deploy:
    name: Deploy to eyra-next-${{ inputs.server }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set VERSION
        run: |
          VERSION="${{ github.ref_name }}_$(date +%F)_${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only -c fly.test.toml \
            --app eyra-next-${{ inputs.server }} \
            --build-arg VERSION=${{ env.VERSION }} \
            --build-arg PLATFORM=fly \
            --build-arg GIT_COMMIT=${{ github.sha }}
        working-directory: core
        env:
          FLY_API_TOKEN: ${{ inputs.server == 'test1' && secrets.FLY_API_TOKEN_TEST1 || secrets.FLY_API_TOKEN_TEST2 }}
