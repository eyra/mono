name: Deploy to Fly.io (staging)

on:
  push:
    branches:
      - 'milestone/*'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io (staging)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set VERSION
        run: |
          VERSION="${{ github.ref_name }}_$(date +%F)_${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only -c fly.staging.toml \
            --app eyra-next-staging \
            --build-arg VERSION=${{ env.VERSION }} \
            --build-arg PLATFORM=fly \
            --build-arg GIT_COMMIT=${{ github.sha }}
        working-directory: core
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}

  e2e:
    name: E2E Tests (staging)
    needs: deploy
    uses: ./.github/workflows/e2e.yml
    with:
      app_name: eyra-next-staging
    secrets:
      SERVICE_LOGIN_KEY: ${{ secrets.SERVICE_LOGIN_KEY }}
